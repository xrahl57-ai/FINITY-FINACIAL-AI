name: Build & Deploy Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Finity Agent Android Application
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js (Latest v24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # Step 3: Install Web Dependencies
      - name: Install Web Dependencies
        run: |
          echo "Installing Node.js dependencies..."
          npm ci || npm install

      # Step 4: Build Web Production Assets
      - name: Build Web Production Assets
        run: |
          echo "Running production web build..."
          npm run build

      # Step 5: Verify Web Build Artifacts
      - name: Verify Web Build Output
        run: |
          echo "Verifying web assets generation..."
          if [ ! -d "dist" ] || [ ! -f "dist/index.html" ]; then
            echo "::error::Web build did not produce 'dist/index.html'. Check build logs."
            exit 1
          fi
          echo "Success: Web build artifacts are valid."

      # Step 6: Verify Android Directory Structure
      - name: Verify Android & Gradle Infrastructure
        run: |
          echo "Verifying Android folder and Gradle configurations..."
          if [ ! -d "android" ]; then
            echo "::error::Android directory ('android') not found. Native project is missing."
            exit 1
          fi
          if [ ! -f "android/gradlew" ]; then
            echo "::error::Gradle wrapper ('android/gradlew') not found. Gradle setup is incomplete."
            exit 1
          fi
          echo "Success: Android directory and Gradle wrapper exist."

      # Step 7: Sync Web Assets to Android WebView
      - name: Sync Mobile Platform Assets
        run: |
          echo "Syncing compiled web files with Capacitor Android container..."
          npx cap sync android

      # Step 8: Set up Java JDK 17 (Required for modern Android Gradle Builds)
      # Note: We do NOT use 'cache: gradle' here to avoid the root-level "No file matched" cache resolution failure.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 9: Set up Gradle Action with Subdirectory Configuration
      # This handles optimal caching of Gradle dependencies using the correct build directory.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android

      # Step 10: Build Android Release APK
      - name: Build Android Release APK
        run: |
          echo "Starting native Gradle release build..."
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      # Step 11: Locate and Verify Release APK Output
      - name: Locate and Verify Output APKs
        run: |
          echo "Locating built APK files..."
          APK_DIR="android/app/build/outputs/apk/release"
          if [ -d "$APK_DIR" ]; then
            echo "APKs found in release directory:"
            ls -la "$APK_DIR"
            
            # Check for APK presence
            APK_COUNT=$(find "$APK_DIR" -name "*.apk" | wc -l)
            if [ "$APK_COUNT" -eq 0 ]; then
              echo "::error::No .apk files found in '$APK_DIR' despite successful Gradle build."
              exit 1
            fi
          else
            echo "::error::Expected output directory '$APK_DIR' does not exist."
            exit 1
          fi

      # Step 12: Archive and Upload Built APK as Artifact
      - name: Upload Android Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finity-Android-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
