name: Build & Deploy Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Finity Agent Android Application
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js (Latest v24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # Step 3: Set up Java JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 4: Install Dependencies
      - name: Install Web Dependencies
        run: |
          echo "Installing Node.js dependencies..."
          npm ci || npm install

      # Step 5: Build Finity Web App
      - name: Build Finity Web App
        run: |
          echo "Running production web build..."
          npm run build

      # Step 6: Capacitor Sync
      - name: Sync Mobile Platform Assets
        run: |
          echo "Syncing compiled web files with Capacitor Android container..."
          npx cap sync android

      # Step 7: Provision Official Compatible Gradle
      - name: Provision Official Compatible Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      # Step 8: Run Android build using system/provisioned "gradle", NOT "./gradlew"
      - name: Build Android Debug APK
        working-directory: android
        run: |
          echo "Starting native Gradle debug build using provisioned gradle..."
          gradle assembleDebug --no-daemon

      # Step 9: Verify APK Exists
      - name: Verify Output APK Exists
        run: |
          echo "Locating built APK files..."
          APK_DIR="android/app/build/outputs/apk/debug"
          if [ -d "$APK_DIR" ]; then
            echo "APKs found in debug directory:"
            ls -la "$APK_DIR"
            
            # Check for APK presence
            APK_COUNT=$(find "$APK_DIR" -name "*.apk" | wc -l)
            if [ "$APK_COUNT" -eq 0 ]; then
              echo "::error::No .apk files found in '$APK_DIR' despite successful Gradle build."
              exit 1
            fi
          else
            echo "::error::Expected output directory '$APK_DIR' does not exist."
            exit 1
          fi

      # Step 10: Upload Finity-Android-APK
      - name: Upload Android Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finity-Android-APK
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
